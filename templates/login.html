{% extends "base.html" %}

{% block content %}
{% if locked_until %}
<div class="lockout-overlay">
    <div class="lockout-box">
        <div class="lockout-cat">🐱</div>
        <h2>Too many incorrect attempts!</h2>
        <p>Come back in <span id="countdown"></span></p>
    </div>
</div>

<script>
    const lockedUntil = {{ locked_until|int }};
    function updateCountdown() {
        const now = Math.floor(Date.now() / 1000);
        let remaining = lockedUntil - now;

        if (remaining <= 0) {
            window.location.reload();
            return;
        }

        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        document.getElementById("countdown").textContent =
            `${minutes}:${seconds.toString().padStart(2, "0")}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

{% else %}
<h2>Login</h2>
{% if error %}
<p style="color: #FF1493; font-weight: bold;">{{ error }}</p>
{% endif %}
<form action="/login" method="post">
    <label>Username: </label>
    <input type="text" name="username" id="username">
    <label>Password: </label>
    <input type="password" name="password" id="password">
    <input type="submit" value="Login">
</form>
{% endif %}
{% endblock %}
